---
- name: Configure TaskFlow Docker host
  hosts: taskflow
  become: true

  vars:
    app_dir: /opt/taskflow
    repo_url: https://github.com/YOUR_GITHUB_USERNAME/taskflow.git
    repo_version: main

  tasks:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_version }}"
        force: true
      become_user: ubuntu

    - name: Start TaskFlow containers
      ansible.builtin.command:
        cmd: docker compose -f devops/containers/docker-compose.yml up -d --build
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Show running containers
      ansible.builtin.command:
        cmd: docker ps
      register: docker_ps
      changed_when: false

    - name: Print container status
      ansible.builtin.debug:
        var: docker_ps.stdout_lines

