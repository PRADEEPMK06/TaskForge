apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskforge-backend
  namespace: taskforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskforge-backend
  template:
    metadata:
      labels:
        app: taskforge-backend
    spec:
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USERNAME/taskforge-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: taskforge-config
            - secretRef:
                name: taskforge-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: taskforge-data
              mountPath: /app/data
      volumes:
        - name: taskforge-data
          persistentVolumeClaim:
            claimName: taskforge-backend-data

