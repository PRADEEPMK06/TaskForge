name: taskflow

services:
  backend:
    build:
      context: ../..
      dockerfile: devops/build/dockerfiles/backend.Dockerfile
    env_file:
      - ../environments/local.env
    ports:
      - "8000:8000"
    volumes:
      - taskflow-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: devops/build/dockerfiles/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  taskflow-data:

